<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Blog Theme Toggle</title>
  <style>
    body.light {
      background-color: #ffffff;
      color: #000000;
      transition: background-color 0.3s, color 0.3s;
    }
    body.dark {
      background-color: #121212;
      color: #f5f5f5;
      transition: background-color 0.3s, color 0.3s;
    }
    #theme-toggle {
      padding: 10px 20px;
      margin: 20px;
      cursor: pointer;
      border: none;
      border-radius: 5px;
      background-color: #0078d7;
      color: white;
      font-size: 16px;
      transition: background-color 0.3s;
    }
    #theme-toggle:hover {
      background-color: #005a9e;
    }
  </style>
</head>
<body>
  <button id="theme-toggle">Switch Theme</button>
  <h1>Welcome to My Blog</h1>
  <p>This is a sample blog post with theme switching functionality.</p>

  <script src="script.js"></script>
</body>
</html>
