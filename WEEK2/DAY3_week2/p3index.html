<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dynamic To-Do List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }
    #todo-container {
      max-width: 400px;
      margin: auto;
    }
    #task-input {
      width: 70%;
      padding: 8px;
      font-size: 14px;
    }
    #add-btn {
      padding: 8px 12px;
      margin-left: 5px;
      cursor: pointer;
      background-color: #0078d7;
      color: white;
      border: none;
      border-radius: 4px;
    }
    ul {
      list-style: none;
      padding: 0;
      margin-top: 20px;
    }
    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      margin-bottom: 8px;
      background: #f0f0f0;
      border-radius: 4px;
    }
    li.completed {
      text-decoration: line-through;
      color: gray;
    }
    .delete-btn {
      background: red;
      color: white;
      border: none;
      padding: 5px 8px;
      border-radius: 4px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="todo-container">
    <h2>My To-Do List</h2>
    <input type="text" id="task-input" placeholder="Enter a task">
    <button id="add-btn">Add Task</button>
    <ul id="task-list"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
