<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Electronics Store</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="#">ElectroShop</a>
    </div>
  </nav>

  <!-- Product Listing -->
  <div class="container my-5">
    <h2 class="text-center mb-4">Our Products</h2>
    <div class="row g-4">
      <!-- Product Card -->
      <div class="col-12 col-md-6 col-lg-3">
        <div class="card h-100">
          <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Laptop">
          <div class="card-body text-center">
            <h5 class="card-title">Laptop</h5>
            <p class="card-text">High performance laptop for work and play.</p>
            <button class="btn btn-primary me-2">Add to Cart</button>
            <button class="btn btn-outline-secondary">View Details</button>
          </div>
        </div>
      </div>

      <!-- Product Card -->
      <div class="col-12 col-md-6 col-lg-3">
        <div class="card h-100">
          <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Smartphone">
          <div class="card-body text-center">
            <h5 class="card-title">Smartphone</h5>
            <p class="card-text">Latest smartphone with advanced features.</p>
            <button class="btn btn-primary me-2">Add to Cart</button>
            <button class="btn btn-outline-secondary">View Details</button>
          </div>
        </div>
      </div>

      <!-- Product Card -->
      <div class="col-12 col-md-6 col-lg-3">
        <div class="card h-100">
          <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Headphones">
          <div class="card-body text-center">
            <h5 class="card-title">Headphones</h5>
            <p class="card-text">Noise-cancelling headphones for immersive sound.</p>
            <button class="btn btn-primary me-2">Add to Cart</button>
            <button class="btn btn-outline-secondary">View Details</button>
          </div>
        </div>
      </div>

      <!-- Product Card -->
      <div class="col-12 col-md-6 col-lg-3">
        <div class="card h-100">
          <img src="https://via.placeholder.com/300x200" class="card-img-top" alt="Smartwatch">
          <div class="card-body text-center">
            <h5 class="card-title">Smartwatch</h5>
            <p class="card-text">Track fitness and stay connected on the go.</p>
            <button class="btn btn-primary me-2">Add to Cart</button>
            <button class="btn btn-outline-secondary">View Details</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
